<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Enhanced gradients for larger size -->
    <linearGradient id="bg-gradient-large" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5B21B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="document-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8FAFC;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow-large" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="8" stdDeviation="6" flood-color="#1E293B" flood-opacity="0.4"/>
    </filter>
    
    <filter id="inner-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Main background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-gradient-large)" filter="url(#shadow-large)"/>
  
  <!-- Inner content -->
  <g>
    <!-- Document base -->
    <rect x="120" y="100" width="272" height="312" rx="20" fill="url(#document-gradient)" filter="url(#inner-shadow)" stroke="#E2E8F0" stroke-width="2"/>
    
    <!-- Original prompt section -->
    <g>
      <!-- Section header -->
      <rect x="140" y="130" width="80" height="20" rx="4" fill="#EF4444" opacity="0.8"/>
      <text x="145" y="144" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">BEFORE</text>
      
      <!-- Original text lines -->
      <rect x="140" y="165" width="200" height="8" rx="4" fill="#9CA3AF"/>
      <rect x="140" y="180" width="160" height="8" rx="4" fill="#9CA3AF"/>
      <rect x="140" y="195" width="180" height="8" rx="4" fill="#9CA3AF"/>
      <rect x="140" y="210" width="140" height="8" rx="4" fill="#9CA3AF"/>
    </g>
    
    <!-- Transformation arrow and effects -->
    <g>
      <!-- Main transformation arrow -->
      <path d="M370 240 l20 16 l-20 16 l-4-4 l12-12 l-12-12 z" fill="#F59E0B" stroke="#D97706" stroke-width="2"/>
      <rect x="340" y="250" width="35" height="8" rx="4" fill="#F59E0B"/>
      
      <!-- Magic sparkles and improvement indicators -->
      <g fill="#FCD34D">
        <circle cx="380" cy="200" r="4"/>
        <circle cx="395" cy="220" r="3"/>
        <circle cx="375" cy="285" r="3.5"/>
        <circle cx="390" cy="300" r="2.5"/>
        
        <!-- Star shapes -->
        <path d="M410 210 l3 9 l9-3 l-9 3 l3 9 l-3-9 l-9 3 l9-3 z"/>
        <path d="M370 320 l2 6 l6-2 l-6 2 l2 6 l-2-6 l-6 2 l6-2 z"/>
        
        <!-- Lightning bolt for "instant improvement" -->
        <path d="M385 260 l-6 12 l4 0 l-2 8 l6-12 l-4 0 z"/>
      </g>
      
      <!-- Improvement particles -->
      <g fill="#34D399" opacity="0.7">
        <circle cx="360" cy="190" r="2"/>
        <circle cx="385" cy="185" r="1.5"/>
        <circle cx="405" cy="270" r="2"/>
        <circle cx="375" cy="310" r="1.5"/>
      </g>
    </g>
    
    <!-- Improved prompt section -->
    <g>
      <!-- Section header -->
      <rect x="140" y="280" width="70" height="20" rx="4" fill="#10B981" opacity="0.9"/>
      <text x="145" y="294" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">AFTER</text>
      
      <!-- Improved text lines -->
      <rect x="140" y="315" width="220" height="8" rx="4" fill="#059669"/>
      <rect x="140" y="330" width="200" height="8" rx="4" fill="#059669"/>
      <rect x="140" y="345" width="210" height="8" rx="4" fill="#059669"/>
      <rect x="140" y="360" width="195" height="8" rx="4" fill="#059669"/>
      <rect x="140" y="375" width="180" height="8" rx="4" fill="#059669"/>
    </g>
    
    <!-- Brand monogram in prominent position -->
    <g transform="translate(40, 40)">
      <circle cx="30" cy="30" r="25" fill="#4F46E5" opacity="0.9"/>
      <text x="30" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="20" font-weight="bold">FYP</text>
    </g>
    
    <!-- Quality indicators -->
    <g transform="translate(320, 350)">
      <!-- Checkmarks for quality -->
      <circle cx="10" cy="10" r="8" fill="#10B981"/>
      <path d="M6 10 l2 2 l4-4" stroke="white" stroke-width="2" fill="none"/>
      
      <circle cx="30" cy="10" r="8" fill="#10B981"/>
      <path d="M26 10 l2 2 l4-4" stroke="white" stroke-width="2" fill="none"/>
      
      <circle cx="50" cy="10" r="8" fill="#10B981"/>
      <path d="M46 10 l2 2 l4-4" stroke="white" stroke-width="2" fill="none"/>
    </g>
  </g>
</svg>