  <!-- Arrow -->
  <polygon points="370,240 390,256 370,272 366,268 382,256 366,244" fill="#F59E0B"/>
  <rect x="340" y="250" width="35" height="8" rx="4" fill="#F59E0B"/>
  
  <!-- Sparkles -->
  <circle cx="380" cy="200" r="4" fill="#FCD34D"/>
