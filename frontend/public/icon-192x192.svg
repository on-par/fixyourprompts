<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background gradient circle -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#1E293B" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main background circle -->
  <circle cx="96" cy="96" r="88" fill="url(#bg-gradient)" filter="url(#shadow)"/>
  
  <!-- Inner design -->
  <g fill="white">
    <!-- Document/prompt icon base -->
    <rect x="48" y="40" width="96" height="112" rx="8" fill="white" opacity="0.95"/>
    
    <!-- Text lines representing prompt -->
    <rect x="60" y="56" width="72" height="4" rx="2" fill="#6B7280"/>
    <rect x="60" y="68" width="60" height="4" rx="2" fill="#6B7280"/>
    <rect x="60" y="80" width="66" height="4" rx="2" fill="#6B7280"/>
    
    <!-- Refinement arrows and sparkles -->
    <g fill="#F59E0B">
      <!-- Main refinement arrow -->
      <path d="M140 70 l8 8 l-8 8 l-2-2 l4-6 l-4-6 z"/>
      <rect x="130" y="76" width="12" height="4" rx="2"/>
      
      <!-- Sparkles indicating improvement -->
      <circle cx="158" cy="65" r="3"/>
      <circle cx="165" cy="78" r="2"/>
      <circle cx="152" cy="88" r="2.5"/>
      
      <!-- Star shape -->
      <path d="M158 95 l2 6 l6-2 l-6 2 l2 6 l-2-6 l-6 2 l6-2 z"/>
    </g>
    
    <!-- Improved text lines -->
    <rect x="60" y="108" width="75" height="4" rx="2" fill="#059669"/>
    <rect x="60" y="120" width="68" height="4" rx="2" fill="#059669"/>
    <rect x="60" y="132" width="72" height="4" rx="2" fill="#059669"/>
    
    <!-- "FYP" monogram in corner -->
    <g transform="translate(20, 20)" fill="#4F46E5" font-family="Arial, sans-serif" font-weight="bold" font-size="16">
      <text x="0" y="16">FYP</text>
    </g>
  </g>
</svg>