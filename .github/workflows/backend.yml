name: Backend CI/CD Pipeline

on:
  push:
    branches: 
      - main
      - develop
      - 'release/*'
      - 'hotfix/*'
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: 
      - main
      - develop
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'
  WORKING_DIRECTORY: backend

# Concurrency control
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========================
  # CODE QUALITY & LINTING
  # ========================
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci --prefer-offline --no-audit

      - name: Type checking
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          if [ -f "tsconfig.json" ]; then
            npm run typecheck || npx tsc --noEmit
          else
            echo "No TypeScript configuration found, skipping type check"
          fi

      - name: Lint code
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          if [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || [ -f "eslint.config.js" ]; then
            npm run lint
          else
            echo "No ESLint configuration found, skipping linting"
          fi

      - name: Check code formatting
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          if [ -f ".prettierrc" ] || [ -f ".prettierrc.json" ]; then
            npm run format:check || npx prettier --check .
          else
            echo "No Prettier configuration found, skipping format check"
          fi

  # ========================
  # SECURITY SCANNING
  # ========================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci --prefer-offline --no-audit

      - name: Run npm audit
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          npm audit --audit-level=moderate --json > npm-audit.json || true
          npm audit --audit-level=moderate

      - name: Security scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: ${{ env.WORKING_DIRECTORY }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload security scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ========================
  # UNIT & INTEGRATION TESTS
  # ========================
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci --prefer-offline --no-audit

      - name: Run tests
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          if npm list --depth=0 | grep -q jest; then
            npm test
          elif npm list --depth=0 | grep -q vitest; then
            npm run test:coverage || npm test
          elif npm list --depth=0 | grep -q mocha; then
            npm test
          else
            echo "No test framework detected, running npm test"
            npm test || echo "No tests found or test command not configured"
          fi

      - name: Upload coverage
        if: hashFiles(format('{0}/coverage/**', env.WORKING_DIRECTORY)) != ''
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ${{ env.WORKING_DIRECTORY }}/coverage
          flags: backend
          name: backend-coverage

  # ========================
  # BUILD & VALIDATION
  # ========================
  build:
    name: Build & Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [code-quality, security-scan, unit-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci --prefer-offline --no-audit

      - name: Build application
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          if grep -q '"build"' package.json; then
            npm run build
          else
            echo "No build script found, validation successful"
          fi

      - name: Start application (validation)
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          if grep -q '"start"' package.json; then
            timeout 30s npm start || echo "Application started successfully (timed out as expected)"
          else
            echo "No start script found, skipping startup validation"
          fi

      - name: Upload build artifacts
        if: hashFiles(format('{0}/dist/**', env.WORKING_DIRECTORY)) != '' || hashFiles(format('{0}/build/**', env.WORKING_DIRECTORY)) != ''
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            ${{ env.WORKING_DIRECTORY }}/dist/
            ${{ env.WORKING_DIRECTORY }}/build/
          retention-days: 30

  # ========================
  # API TESTING (if applicable)
  # ========================
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    if: hashFiles('backend/test/api/**') != '' || hashFiles('backend/tests/api/**') != '' || hashFiles('backend/__tests__/api/**') != ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIRECTORY }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: npm ci --prefer-offline --no-audit

      - name: Run API tests
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          if grep -q '"test:api"' package.json; then
            npm run test:api
          elif grep -q '"test:integration"' package.json; then
            npm run test:integration
          else
            echo "No API test script found"
          fi

  # ========================
  # DEPLOYMENT - STAGING
  # ========================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    environment:
      name: backend-staging
      url: https://api-staging.fixyourprompts.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying backend to staging environment..."
          echo "Add your backend deployment commands here"
          # Examples:
          # - Docker image build and push
          # - Kubernetes deployment
          # - Cloud provider deployment (AWS, GCP, Azure)
          # - PM2 deployment

  # ========================
  # DEPLOYMENT - PRODUCTION
  # ========================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, api-tests]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    environment:
      name: backend-production
      url: https://api.fixyourprompts.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying backend to production environment..."
          echo "Add your production deployment commands here"

  # ========================
  # NOTIFICATIONS
  # ========================
  notify:
    name: Notifications
    runs-on: ubuntu-latest
    needs: [code-quality, security-scan, unit-tests, build]
    if: always()
    
    steps:
      - name: Generate summary report
        run: |
          {
            echo "# Backend CI/CD Pipeline Summary"
            echo ""
            echo "**Branch**: ${{ github.ref_name }}"
            echo "**Commit**: ${{ github.sha }}"
            echo "**Triggered by**: ${{ github.event_name }}"
            echo ""
            echo "## Job Results"
            echo "- Code Quality: ${{ needs.code-quality.result }}"
            echo "- Security Scan: ${{ needs.security-scan.result }}"
            echo "- Unit Tests: ${{ needs.unit-tests.result }}"
            echo "- Build: ${{ needs.build.result }}"
          } >> $GITHUB_STEP_SUMMARY

      - name: Slack notification on failure
        if: failure() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#ci-cd'
          text: |
            Backend CI/CD Pipeline Failed!
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}