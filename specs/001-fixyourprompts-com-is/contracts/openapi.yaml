openapi: 3.0.0
info:
  title: FixYourPrompts API
  version: 1.0.0
  description: API for refining user-submitted prompts.

paths:
  /refine:
    post:
      summary: Refine a user's prompt
      operationId: refinePrompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefineRequest'
      responses:
        '200':
          description: Successfully refined the prompt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefineResponse'
        '400':
          description: Bad Request - Invalid input

components:
  schemas:
    RefineRequest:
      type: object
      properties:
        prompt:
          type: string
          description: The user-submitted prompt to be refined.
          maxLength: 4096
      required:
        - prompt

    RefineResponse:
      type: object
      properties:
        original_prompt:
          type: string
          description: The original prompt submitted by the user.
        refined_prompt:
          type: string
          description: The refined prompt generated by the system.
        explanation:
          type: string
          description: An explanation of the changes made to the prompt.
      required:
        - original_prompt
        - refined_prompt
        - explanation
